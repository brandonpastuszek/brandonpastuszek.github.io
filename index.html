<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: var(--accent-color);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: var(--bg-color);
        }
        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
        p { font-size: 15px; color: #94a3b8; margin-bottom: 30px; }
        .links-container { display: flex; flex-direction: column; gap: 16px; }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .link-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
        .link-btn i { font-size: 18px; }
        .link-text { display: flex; align-items: center; gap: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-img"><i class="fa-solid fa-user"></i></div>
        <h1>Your Name</h1>
        <p>Your Profession / Job Title</p>
        <div class="links-container">
            <a href="https://yourportfolio.com" target="_blank" class="link-btn">
                <span class="link-text"><i class="fa-solid fa-briefcase"></i> Portfolio</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
            <a href="resume.pdf" target="_blank" class="link-btn">
                <span class="link-text"><i class="fa-solid fa-file-pdf"></i> Resume</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
            <a href="https://linkedin.com" target="_blank" class="link-btn">
                <span class="link-text"><i class="fa-brands fa-linkedin"></i> LinkedIn</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
        </div>
    </div>
</body>
</html>
